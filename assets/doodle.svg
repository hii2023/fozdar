<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Doodle portrait of Mehul">
  <defs>
    <style>
      .ink { fill: none; stroke: #1c2b3a; stroke-width: 3.4; stroke-linecap: round; stroke-linejoin: round; }
      .skin { fill: #cd9a6f; }
      .skinshade { fill: #bd875a; }
      .hair { fill: #171614; }
      .shirt { fill: #7c3b40; }
      .shirtdark { fill: #6a3136; }
      .teeth { fill: #fbf7f0; }
    </style>
  </defs>

  <!-- background -->
  <circle cx="120" cy="120" r="112" fill="#fbf7f0"/>
  <circle cx="120" cy="120" r="112" class="ink"/>

  <!-- shoulders / maroon polo -->
  <path class="shirt" d="M40 236 C 48 192, 82 176, 120 176 C 158 176, 192 192, 200 236 Z"/>
  <path class="ink" d="M40 236 C 48 192, 82 176, 120 176 C 158 176, 192 192, 200 236"/>
  <!-- collar -->
  <path class="shirtdark" d="M104 178 L120 196 L136 178 L128 174 L120 184 L112 174 Z"/>
  <path class="ink" d="M104 178 L120 196 L136 178 M112 174 L120 184 L128 174"/>
  <path class="ink" d="M120 196 L120 210"/>

  <!-- neck -->
  <path class="skin" d="M107 152 h26 v20 c 0 9, -26 9, -26 0 Z"/>
  <path class="skinshade" d="M107 168 c 8 5, 18 5, 26 0 v4 c -8 6, -18 6, -26 0 Z"/>
  <path class="ink" d="M107 152 v16 M133 152 v16"/>

  <!-- ears -->
  <path class="skin" d="M80 112 c -11 -2, -12 17, 1 16"/>
  <path class="ink" d="M80 112 c -11 -2, -12 17, 1 16"/>
  <path class="skin" d="M160 112 c 11 -2, 12 17, -1 16"/>
  <path class="ink" d="M160 112 c 11 -2, 12 17, -1 16"/>

  <!-- head -->
  <path class="skin" d="M80 112 C 80 78, 98 60, 120 60 C 142 60, 160 78, 160 112 C 160 142, 143 160, 120 160 C 97 160, 80 142, 80 112 Z"/>
  <path class="ink" d="M80 112 C 80 78, 98 60, 120 60 C 142 60, 160 78, 160 112 C 160 142, 143 160, 120 160 C 97 160, 80 142, 80 112 Z"/>

  <!-- hair: wavy, full on top, slight temple recede, sideburns -->
  <path class="hair" d="M78 116
    C 72 104, 74 96, 76 90
    C 72 84, 78 78, 82 78
    C 82 70, 92 64, 98 66
    C 102 58, 116 56, 122 60
    C 130 55, 144 60, 146 68
    C 154 66, 164 74, 160 84
    C 166 90, 164 102, 160 114
    C 159 104, 156 96, 150 92
    C 152 86, 150 82, 150 82
    C 142 80, 128 80, 118 82
    C 110 78, 96 80, 90 86
    C 86 90, 84 96, 84 102
    C 82 106, 80 110, 78 116 Z"/>
  <path class="ink" d="M78 116 C 72 100, 74 90, 80 82 C 88 70, 104 62, 120 62 C 136 62, 152 70, 158 84 C 162 94, 162 106, 160 114"/>
  <!-- sideburns -->
  <path class="hair" d="M82 100 c -3 10, -2 20, 2 26 c -6 -4, -8 -16, -6 -26 Z"/>
  <path class="hair" d="M158 100 c 3 10, 2 20, -2 26 c 6 -4, 8 -16, 6 -26 Z"/>
  <!-- a couple of front curls -->
  <path class="ink" d="M96 78 q6 -6, 14 -4 M120 74 q8 -4, 16 0 M86 88 q4 -5, 10 -5"/>

  <!-- eyebrows -->
  <path class="ink" d="M90 100 q11 -6, 22 -1" style="stroke-width:4.4"/>
  <path class="ink" d="M128 99 q11 -5, 22 1" style="stroke-width:4.4"/>

  <!-- glasses: rectangular -->
  <rect x="86" y="104" width="30" height="22" rx="6" class="ink"/>
  <rect x="124" y="104" width="30" height="22" rx="6" class="ink"/>
  <path class="ink" d="M116 112 h8 M86 108 l-8 -3 M154 108 l8 -3"/>

  <!-- eyes -->
  <circle cx="101" cy="115" r="2.8" fill="#1c2b3a"/>
  <circle cx="139" cy="115" r="2.8" fill="#1c2b3a"/>

  <!-- nose -->
  <path class="ink" d="M120 120 v12 q0 4, -5 5"/>

  <!-- mustache -->
  <path class="hair" d="M102 142 C 110 138, 116 139, 120 142 C 124 139, 130 138, 138 142 C 134 150, 126 150, 120 146 C 114 150, 106 150, 102 142 Z"/>

  <!-- open smile with teeth -->
  <path class="teeth" d="M104 150 C 112 150, 128 150, 136 150 C 133 160, 126 164, 120 164 C 114 164, 107 160, 104 150 Z"/>
  <path class="ink" d="M104 150 C 112 158, 128 158, 136 150"/>
  <path class="ink" d="M107 152 C 114 156, 126 156, 133 152"/>
</svg>
